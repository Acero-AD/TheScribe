# Name of your application. Used to uniquely configure containers.
service: backend

# Name of the container image on GHCR (combined with registry.server below
# this becomes ghcr.io/acero-ad/thescribe-backend).
image: acero-ad/thescribe-backend

# Deploy to these servers. The host (Hetzner IP) comes from the deploy
# environment (KAMAL_DEPLOY_IP), set on the workstation or in CI — never
# hardcoded here.
servers:
  web:
    - <%= ENV["KAMAL_DEPLOY_IP"] %>

# Enable SSL auto certification via Let's Encrypt and allow for multiple apps on a single web server.
# If used with Cloudflare, set encryption mode in SSL/TLS setting to "Full" to enable CF-to-app encryption.
#
# Using an SSL proxy like this requires turning on config.assume_ssl and config.force_ssl in production.rb!
#
# Don't use this when deploying to multiple web servers (then you have to terminate SSL at your load balancer).
#
proxy:
  ssl: true
  host: <%= ENV["APP_HOST"] %>

# Where you keep your container images.
registry:
  server: ghcr.io
  username: <%= ENV["KAMAL_REGISTRY_USERNAME"] %>
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - RESEND_API_KEY
  clear:
    # Run the Solid Queue Supervisor inside the web server's Puma process.
    SOLID_QUEUE_IN_PUMA: true
    # Public domains (not secrets): the backend's own host (for mailer URLs)
    # and the frontend origin (for CORS + magic-link redirect).
    APP_HOST: <%= ENV["APP_HOST"] %>
    FRONTEND_URL: <%= ENV["FRONTEND_URL"] %>
    # Magic-link "from" address on the Resend-verified domain (not a secret).
    MAILER_FROM: <%= ENV["MAILER_FROM"] %>

# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
# "bin/kamal logs -r job" will tail logs from the first server in the job section.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Use a persistent storage volume for sqlite database files and local Active Storage files.
# Recommended to change this to a mounted volume path that is backed up off server.
volumes:
  - "backend_storage:/rails/storage"


# Configure the image builder.
builder:
  arch: amd64

  # # Build image via remote server (useful for faster amd64 builds on arm64 computers)
  # remote: ssh://docker@docker-builder-server
  #
  # # Pass arguments and secrets to the Docker build process
  # args:
  #   RUBY_VERSION: ruby-4.0.3
  # secrets:
  #   - GITHUB_TOKEN
  #   - RAILS_MASTER_KEY

# Use a different ssh user than root
# ssh:
#   user: app

# Self-hosted Postgres, co-located on the VPS as a Kamal accessory. Kamal
# names the container "backend-db" and attaches it to the shared "kamal"
# Docker network, so the app reaches it at backend-db:5432 (DATABASE_URL).
# The port is intentionally NOT published — it is reachable only over the
# internal Docker network, never the public internet. Data persists in the
# "data" directory across container restarts and redeploys.
accessories:
  db:
    image: postgres:17-alpine
    host: <%= ENV["KAMAL_DEPLOY_IP"] %>
    env:
      clear:
        POSTGRES_USER: scribe
        POSTGRES_DB: scribe_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
