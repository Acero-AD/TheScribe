# PostgreSQL via the `pg` gem.
#
# Local dev runs against the postgres service in `docker-compose.yml`. The
# defaults below match those env values; override any of them with the named
# env vars when running against a different host.
#
# Production uses a single database, provided via DATABASE_URL (e.g. Neon).
# Solid Queue and Solid Cache share this primary database — there are no
# separate cache/queue/cable databases.

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>
  username: <%= ENV.fetch("DATABASE_USER") { "scribe" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { "scribe" } %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME") { "scribe_development" } %>

test:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME") { "scribe_test" } %>

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
