# PostgreSQL via the `pg` gem.
#
# Local dev runs against the postgres service in `docker-compose.yml`. The
# defaults below match those env values; override any of them with the named
# env vars when running against a different host.
#
# Production uses four databases on the same Postgres host (one for the app,
# three for the Solid* gems). Configure them with DATABASE_URL plus
# CACHE_DATABASE_URL / QUEUE_DATABASE_URL / CABLE_DATABASE_URL, or by
# overriding the per-key host/user/password env vars below.

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>
  username: <%= ENV.fetch("DATABASE_USER") { "scoreboard" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { "scoreboard" } %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME") { "scoreboard_development" } %>

test:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME") { "scoreboard_test" } %>

production:
  primary:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
    database: <%= ENV.fetch("DATABASE_NAME") { "scoreboard_production" } %>
  cache:
    <<: *default
    url: <%= ENV["CACHE_DATABASE_URL"] %>
    database: <%= ENV.fetch("CACHE_DATABASE_NAME") { "scoreboard_production_cache" } %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    url: <%= ENV["QUEUE_DATABASE_URL"] %>
    database: <%= ENV.fetch("QUEUE_DATABASE_NAME") { "scoreboard_production_queue" } %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    url: <%= ENV["CABLE_DATABASE_URL"] %>
    database: <%= ENV.fetch("CABLE_DATABASE_NAME") { "scoreboard_production_cable" } %>
    migrations_paths: db/cable_migrate
