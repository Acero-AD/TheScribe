# Local development infrastructure for The Scribe backend.
#
#   docker compose up -d           # start Postgres + Rails in the background
#   docker compose logs -f web     # tail the Rails server
#   docker compose ps              # see status
#   docker compose down            # stop (data persists in named volumes)
#   docker compose down -v         # stop and wipe the database + bundle cache
#
# The `web` service builds from `Dockerfile.dev`, bind-mounts the
# application source so edits hot-reload, and connects to `postgres`
# over the compose network. Rails reads DATABASE_HOST/USER/PASSWORD
# from the environment below (see config/database.yml).

services:
  postgres:
    image: postgres:17-alpine
    container_name: scribe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: scribe
      POSTGRES_PASSWORD: scribe
      POSTGRES_DB: scribe_development
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scribe -d scribe_development"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: scribe-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RAILS_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: scribe
      DATABASE_PASSWORD: scribe
      DATABASE_NAME: scribe_development
      BINDING: 0.0.0.0
      # Forwarded from the host when tunneling for phone testing — see
      # docs/testing-on-phone.md. Empty by default; when set, ActionMailer
      # generates magic-link URLs pointing at the tunnel host.
      DEV_PUBLIC_HOST: ${DEV_PUBLIC_HOST:-}
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
      - bundle-cache:/usr/local/bundle
      - rails-tmp:/rails/tmp
    command: >
      bash -c "rm -f tmp/pids/server.pid &&
               bin/rails db:prepare &&
               bin/rails server -b 0.0.0.0 -p 3000"

volumes:
  postgres-data:
  bundle-cache:
  rails-tmp:
