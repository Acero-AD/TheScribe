# Local development infrastructure for the Scoreboard backend.
#
#   docker compose up -d   # start Postgres in the background
#   docker compose ps      # see status
#   docker compose down    # stop (data persists in the postgres-data volume)
#   docker compose down -v # stop and wipe the database
#
# Rails connects via the env vars in config/database.yml. Defaults below match
# the values Rails uses when no env is set, so `bin/rails db:prepare` works
# out of the box once this stack is up.

services:
  postgres:
    image: postgres:17-alpine
    container_name: scoreboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: scoreboard
      POSTGRES_PASSWORD: scoreboard
      POSTGRES_DB: scoreboard_development
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scoreboard -d scoreboard_development"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
