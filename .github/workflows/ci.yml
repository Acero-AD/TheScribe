name: CI

# Single workflow for the monorepo. It always runs, then a change-detection
# gate decides which pipeline's jobs execute. Branch protection should require
# ONLY the `ci-success` job — see openspec/changes/add-ci-pipelines/design.md.
on:
  pull_request:
  push:
    branches: [ master ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ---------------------------------------------------------------------------
  # Backend pipeline (Rails) — runs only when backend/** changed
  # ---------------------------------------------------------------------------
  backend-scan:
    name: Backend · security scan
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: backend
          bundler-cache: true

      - name: Scan for Rails security vulnerabilities (Brakeman)
        run: bin/brakeman --no-pager

      # Gem CVEs (third-party, often not immediately fixable) are reported but
      # MUST NOT block merges or deploys. `continue-on-error` surfaces the
      # failure on the step while keeping the job — and thus `ci-success` and
      # `deploy-backend` — green. Brakeman (our own code) stays blocking.
      - name: Audit gems for known CVEs (bundler-audit)
        continue-on-error: true
        run: bin/bundler-audit

  backend-lint:
    name: Backend · RuboCop
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: backend
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v5
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('backend/.ruby-version', 'backend/**/.rubocop.yml', 'backend/**/.rubocop_todo.yml', 'backend/Gemfile.lock') }}
        with:
          path: backend/tmp/rubocop
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint Ruby for consistent style
        run: bin/rubocop -f github

  backend-test:
    name: Backend · tests
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: scribe
          POSTGRES_PASSWORD: scribe
          POSTGRES_DB: scribe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scribe -d scribe_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      RAILS_ENV: test
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: scribe
      DATABASE_PASSWORD: scribe
      DATABASE_NAME: scribe_test
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install system packages (libvips for Active Storage)
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libvips

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: backend
          bundler-cache: true

      - name: Prepare test database and run tests
        run: bin/rails db:test:prepare test

  # ---------------------------------------------------------------------------
  # Frontend pipeline (Vite/React) — runs only when frontend/** changed
  # ---------------------------------------------------------------------------
  frontend-scan:
    name: Frontend · security scan
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # npm CVEs (third-party, often not immediately fixable) are reported but
      # MUST NOT block merges or deploys. `continue-on-error` surfaces the
      # failure on the step while keeping the job — and thus `ci-success` —
      # green. Dependabot still raises PRs for actual upgrades.
      - name: Audit npm dependencies for known CVEs
        continue-on-error: true
        run: npm audit

  frontend-lint:
    name: Frontend · ESLint
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  frontend-test:
    name: Frontend · tests
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  frontend-build:
    name: Frontend · build
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (type-check + bundle)
        run: npm run build

  # ---------------------------------------------------------------------------
  # Aggregate gate — the ONLY check to mark required in branch protection.
  # Passes when every pipeline job succeeded or was skipped; fails if any
  # failed or was cancelled. This keeps path-filtered PRs from hanging on
  # jobs that never started.
  # ---------------------------------------------------------------------------
  ci-success:
    name: CI success
    if: ${{ always() }}
    needs:
      - changes
      - backend-scan
      - backend-lint
      - backend-test
      - frontend-scan
      - frontend-lint
      - frontend-test
      - frontend-build
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any pipeline job failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more CI jobs failed or were cancelled."
          exit 1

      - name: Report success
        run: echo "All pipeline jobs passed or were skipped."

  # ---------------------------------------------------------------------------
  # Deployment — runs only on pushes to master, only for the area that changed,
  # and only after that area's pipeline jobs succeeded. These jobs are
  # intentionally NOT part of `ci-success` and must NOT be required in branch
  # protection (they never run for pull requests). A skipped pipeline dependency
  # (area unchanged) skips the deploy too, so each side deploys independently.
  # All real values come from repository secrets/variables (see tasks 8.1).
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Backend · deploy
    needs:
      - changes
      - backend-scan
      - backend-lint
      - backend-test
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: backend
    env:
      KAMAL_DEPLOY_IP: ${{ secrets.KAMAL_DEPLOY_IP }}
      KAMAL_REGISTRY_USERNAME: ${{ github.actor }}
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      APP_HOST: ${{ vars.APP_HOST }}
      FRONTEND_URL: ${{ vars.FRONTEND_URL }}
      MAILER_FROM: ${{ vars.MAILER_FROM }}
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: backend
          bundler-cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trust the deploy host
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          # No -H: hashed known_hosts entries are matched unreliably by net-ssh
          # (the SSH lib Kamal uses), causing Net::SSH::HostKeyMismatch even
          # when the scanned key is correct. Pin key types to what the host serves.
          ssh-keyscan -t rsa,ecdsa,ed25519 "$KAMAL_DEPLOY_IP" >> ~/.ssh/known_hosts

      - name: Add SSH deploy key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_DEPLOY_KEY }}

      - name: Deploy with Kamal
        run: bundle exec kamal deploy

  deploy-frontend:
    name: Frontend · deploy
    needs:
      - changes
      - frontend-lint
      - frontend-test
      - frontend-build
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (embeds the production backend URL)
        run: npm run build
        env:
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch=master
